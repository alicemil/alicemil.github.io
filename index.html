<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sitesi & Admin Paneli</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Top Bar & Login */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Site Content Section */
        .site-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #3b82f6;
        }

        .site-title {
            font-size: 28px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .site-subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .announcement {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        /* Admin Control Panel */
        .admin-panel {
            display: none; /* Admin değilken gizli */
            background: #1e1e38;
            border: 2px solid #6366f1;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .admin-panel h3 {
            color: #818cf8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 14px;
        }

        /* Comments Section */
        .comments-section {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .comment-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .comment-author {
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #cbd5e1;
            font-size: 14px;
        }

        /* Modal / Pop-up for Login */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            text-align: center;
            font-size: 16px;
        }

        .badge-admin {
            background: #6366f1;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Header -->
    <div class="header-bar">
        <h2>Proje Portalı <span id="adminBadge" class="badge-admin" style="display:none;">ADMIN</span></h2>
        <button id="authBtn" class="btn" onclick="toggleAuthModal()">Admin Girişi</button>
    </div>

    <!-- Canlı Düzenlenebilir Site Alanı -->
    <div class="site-card">
        <h1 class="site-title" id="displayTitle">Hoş Geldiniz!</h1>
        <p class="site-subtitle" id="displaySubtitle">Bu alan admin paneli üzerinden anlık olarak güncellenebilir.</p>
        <div class="announcement" id="displayAnnouncement">
            📢 <b>Duyuru:</b> Sitemiz yayındadır. Görüşlerinizi aşağıdaki yorum bölümünden paylaşabilirsiniz!
        </div>
    </div>

    <!-- Admin Panel (Giriş Yapılınca Açılır) -->
    <div id="adminPanel" class="admin-panel">
        <h3>⚙️ Admin Yönetim Paneli</h3>
        
        <div class="form-group">
            <label>Site Başlığı:</label>
            <input type="text" id="editTitleInput" placeholder="Yeni site başlığı...">
        </div>

        <div class="form-group">
            <label>Alt Başlık / Açıklama:</label>
            <input type="text" id="editSubtitleInput" placeholder="Yeni alt başlık...">
        </div>

        <div class="form-group">
            <label>Duyuru Metni:</label>
            <textarea id="editAnnouncementInput" rows="2" placeholder="Duyuru içeriği..."></textarea>
        </div>

        <button class="btn" onclick="saveSiteContent()">Değişiklikleri Kaydet</button>
    </div>

    <!-- Yorumlar Bölümü -->
    <div class="comments-section">
        <h3>💬 Yorumlar</h3>
        <br>

        <!-- Yorum Ekleme Formu -->
        <div class="comment-form">
            <input type="text" id="commentAuthor" class="form-group" placeholder="Adınız / Kullanıcı Adınız" style="padding:10px; background:#0f172a; color:#fff; border:1px solid #334155; border-radius:6px;">
            <textarea id="commentText" placeholder="Yorumunuzu buraya yazın..." style="padding:10px; background:#0f172a; color:#fff; border:1px solid #334155; border-radius:6px; resize:vertical; min-height:70px;"></textarea>
            <button class="btn" onclick="addComment()">Yorum Ekle</button>
        </div>

        <!-- Yorum Listesi -->
        <div id="commentsList">
            <!-- Yorumlar JavaScript ile buraya dinamik eklenecek -->
        </div>
    </div>
</div>

<!-- Admin Giriş Modalı -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Admin Girişi</h3>
        <input type="password" id="adminPasswordInput" placeholder="Şifreyi Girin (1256)">
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" onclick="loginAdmin()">Giriş Yap</button>
            <button class="btn btn-danger" onclick="closeAuthModal()">İptal</button>
        </div>
    </div>
</div>

<script>
    // Varsayılan Ayarlar & Örnek Yorumlar
    const ADMIN_PASSWORD = "1256";
    let isAdmin = localStorage.getItem("isAdmin") === "true";

    const defaultComments = [
        { id: 1, author: "Ahmet", text: "Tasarım harika görünüyor, elinize sağlık!" },
        { id: 2, author: "Çınar", text: "Admin panelinden direkt içerik değiştirebilmek süper olmuş." }
    ];

    // Sayfa Yüklendiğinde
    window.onload = function() {
        loadSiteContent();
        loadComments();
        updateAdminUI();
    };

    // --- ADMIN GİRİŞ/ÇIKIŞ İŞLEMLERİ ---
    function toggleAuthModal() {
        if (isAdmin) {
            // Admin zaten giriş yapmışsa çıkış yap
            isAdmin = false;
            localStorage.setItem("isAdmin", "false");
            updateAdminUI();
            alert("Admin oturumu kapatıldı.");
        } else {
            document.getElementById("loginModal").style.display = "flex";
            document.getElementById("adminPasswordInput").value = "";
        }
    }

    function closeAuthModal() {
        document.getElementById("loginModal").style.display = "none";
    }

    function loginAdmin() {
        const pass = document.getElementById("adminPasswordInput").value;
        if (pass === ADMIN_PASSWORD) {
            isAdmin = true;
            localStorage.setItem("isAdmin", "true");
            closeAuthModal();
            updateAdminUI();
            alert("Admin girişi başarılı!");
        } else {
            alert("Hatalı şifre! (Varsayılan şifre: 1256)");
        }
    }

    function updateAdminUI() {
        const adminPanel = document.getElementById("adminPanel");
        const authBtn = document.getElementById("authBtn");
        const adminBadge = document.getElementById("adminBadge");

        if (isAdmin) {
            adminPanel.style.display = "block";
            authBtn.textContent = "Çıkış Yap";
            authBtn.classList.add("btn-danger");
            adminBadge.style.display = "inline";
        } else {
            adminPanel.style.display = "none";
            authBtn.textContent = "Admin Girişi";
            authBtn.classList.remove("btn-danger");
            adminBadge.style.display = "none";
        }
        renderComments(); // Admin butonlarını göster/gizle
    }

    // --- SİTE İÇERİĞİ DÜZENLEME ---
    function loadSiteContent() {
        const title = localStorage.getItem("siteTitle") || "Hoş Geldiniz!";
        const subtitle = localStorage.getItem("siteSubtitle") || "Bu alan admin paneli üzerinden anlık olarak güncellenebilir.";
        const ann = localStorage.getItem("siteAnnouncement") || "📢 <b>Duyuru:</b> Sitemiz yayındadır. Görüşlerinizi aşağıdaki yorum bölümünden paylaşabilirsiniz!";

        document.getElementById("displayTitle").innerHTML = title;
        document.getElementById("displaySubtitle").innerHTML = subtitle;
        document.getElementById("displayAnnouncement").innerHTML = ann;

        // Form girdilerini de doldur
        document.getElementById("editTitleInput").value = title;
        document.getElementById("editSubtitleInput").value = subtitle;
        document.getElementById("editAnnouncementInput").value = ann.replace(/<[^>]*>?/gm, '');
    }

    function saveSiteContent() {
        const newTitle = document.getElementById("editTitleInput").value;
        const newSubtitle = document.getElementById("editSubtitleInput").value;
        const newAnn = document.getElementById("editAnnouncementInput").value;

        if (newTitle) localStorage.setItem("siteTitle", newTitle);
        if (newSubtitle) localStorage.setItem("siteSubtitle", newSubtitle);
        if (newAnn) localStorage.setItem("siteAnnouncement", "📢 <b>Duyuru:</b> " + newAnn);

        loadSiteContent();
        alert("Site içeriği güncellendi!");
    }

    // --- YORUM SİSTEMİ İŞLEMLERİ ---
    function getComments() {
        const stored = localStorage.getItem("userComments");
        return stored ? JSON.parse(stored) : defaultComments;
    }

    function loadComments() {
        renderComments();
    }

    function renderComments() {
        const comments = getComments();
        const container = document.getElementById("commentsList");
        container.innerHTML = "";

        comments.forEach(c => {
            const div = document.createElement("div");
            div.className = "comment-item";
            
            let deleteBtnHTML = isAdmin 
                ? `<button class="btn btn-danger" style="padding:4px 10px; font-size:12px;" onclick="deleteComment(${c.id})">Sil</button>` 
                : "";

            div.innerHTML = `
                <div>
                    <div class="comment-author">${escapeHtml(c.author)}</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
                ${deleteBtnHTML}
            `;
            container.appendChild(div);
        });
    }

    function addComment() {
        const authorInput = document.getElementById("commentAuthor");
        const textInput = document.getElementById("commentText");

        const author = authorInput.value.trim() || "Anonim";
        const text = textInput.value.trim();

        if (!text) {
            alert("Lütfen bir yorum yazın.");
            return;
        }

        const comments = getComments();
        const newComment = {
            id: Date.now(),
            author: author,
            text: text
        };

        comments.push(newComment);
        localStorage.setItem("userComments", JSON.stringify(comments));

        textInput.value = "";
        authorInput.value = "";
        renderComments();
    }

    function deleteComment(id) {
        if (!confirm("Bu yorumu silmek istediğinize emin misiniz?")) return;
        let comments = getComments();
        comments = comments.filter(c => c.id !== id);
        localStorage.setItem("userComments", JSON.stringify(comments));
        renderComments();
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
